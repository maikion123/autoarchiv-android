name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Download Android SDK components
      run: |
        sdkmanager "platforms;android-33"
        sdkmanager "build-tools;33.0.0"
        sdkmanager "platform-tools"

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build APK
      run: ./gradlew clean assembleDebug --stacktrace

    - name: Debug - list build outputs
      if: always()
      run: |
        echo "Build directory contents:"
        find app/build -type f -name "*.apk" 2>/dev/null | head -20
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: autoarchiv-android-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create/Update Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: latest
        draft: false
        prerelease: false
        body: "nextKM Android App - Built on ${{ github.event.head_commit.timestamp }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on PR with APK download
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Android APK built! Download from Artifacts tab above.'
          })
