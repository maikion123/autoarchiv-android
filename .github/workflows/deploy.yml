name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via Webhook
        if: success()
        run: |
          curl -s -X POST https://nextkm.de/api/deploy \
            -H "x-deploy-token: 2af5729b9287960d8caab01bd315bb84fe40647296841779baf72567ba2424d0" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --max-time 60
          echo "✓ Deploy ausgelöst"
